<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- WRAD launch icon: a rat rides out at dawn, silhouetted against the
       rising sun. Same flat/chunky idiom as packages/app/src/replay/art.
       All art stays inside the center ~80% (maskable safe zone); only the
       sky and ground run full-bleed, so this single master renders every
       icon size including icon-maskable-512. -->
  <!-- night sky -->
  <rect width="64" height="64" fill="#0d0b09"/>
  <!-- SKY-ART: dawn glow + sun (build script rescales this group for the
       maskable icon) -->
  <defs>
    <radialGradient id="dawn-glow">
      <stop offset="0.62" stop-color="#c05b2a" stop-opacity="0.5"/>
      <stop offset="1" stop-color="#c05b2a" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <g id="sky-art">
    <circle cx="32" cy="34" r="30" fill="url(#dawn-glow)"/>
    <circle cx="32" cy="34" r="19" fill="#e2a93f"/>
    <circle cx="32" cy="34" r="19" fill="none" stroke="#f0c56a" stroke-width="1.2"/>
  </g>
  <!-- ground, full-bleed so the Android mask never shows a floating edge -->
  <path d="M0 48 Q16 44.5 32 46 Q48 47.5 64 45.5 L64 64 L0 64 Z" fill="#191009"/>
  <!-- FIG-ART: rat rider, backlit silhouette (also rescaled for maskable) -->
  <g id="fig-art" fill="#1c1109">
    <!-- banner pole + pennant trailing in the wind -->
    <path d="M34 29 L45 10" stroke="#1c1109" stroke-width="1.8" stroke-linecap="round" fill="none"/>
    <path d="M45.5 9 L33 6 L36.5 10.5 L33.5 15 L45 12.5 Z" fill="#a03a2e"/>
    <!-- tail flying behind -->
    <path d="M14 34 Q5 30 7 21" stroke="#1c1109" stroke-width="2.8" stroke-linecap="round" fill="none"/>
    <!-- hind legs stretched back, front legs reaching forward (gallop) -->
    <path d="M18 41 Q12 46 8 49" stroke="#1c1109" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M22 43 Q18 47 15 50" stroke="#1c1109" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M42 41 Q49 44 53 47" stroke="#1c1109" stroke-width="3" stroke-linecap="round" fill="none"/>
    <path d="M39 43 Q44 47 47 50" stroke="#1c1109" stroke-width="3" stroke-linecap="round" fill="none"/>
    <!-- body -->
    <path d="M13 41 C10 33 17 27.5 26 27.5 C35 27 43 29.5 47 33.5 C48.5 38 44 43.5 34 44.5 C24 45.5 15 45.5 13 41 Z"/>
    <!-- head lunging forward, snout to the sunrise -->
    <path d="M45 31 C44 25.5 50 22.5 55 24.5 L61 30.5 C62.3 31.7 61.5 33.4 60 33.3 L53 33.6 C49 34.6 46 33 45 31 Z"/>
    <circle cx="48.5" cy="23.5" r="3.4"/>
    <!-- a spark of dawn in the eye -->
    <circle cx="56.5" cy="28.5" r="1.1" fill="#e2a93f"/>
  </g>
</svg>
