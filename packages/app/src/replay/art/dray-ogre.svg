<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Dray-Ogre: hulking brute, huge shoulders, tiny head, big fist + club -->
  <!-- club raised -->
  <path d="M42 30 L58 12 L62 16 L46 34 Z" fill="#4e4234" stroke="#1a222b" stroke-width="1.5" stroke-linejoin="round"/>
  <circle cx="59" cy="13" r="6" fill="#5a4d3a" stroke="#1a222b" stroke-width="1.5"/>
  <!-- thick legs -->
  <rect x="20" y="47" width="8" height="14" rx="2" fill="#33414f"/>
  <rect x="32" y="47" width="8" height="14" rx="2" fill="#2a3540"/>
  <!-- massive hunched body -->
  <path d="M14 30 C14 22 30 20 40 24 C50 28 50 44 46 50 C42 54 18 54 15 49 C12 44 14 36 14 30 Z" fill="#46586e" stroke="#1a222b" stroke-width="1.8" stroke-linejoin="round"/>
  <!-- belly shade -->
  <path d="M22 40 C26 50 40 50 43 42 C42 48 38 51 30 51 C24 51 22 47 22 40 Z" fill="#33414f"/>
  <!-- big gripping arm/fist up to club -->
  <path d="M40 30 C46 26 50 28 48 34 L42 34 Z" fill="#b9a78f" stroke="#1a222b" stroke-width="1.3"/>
  <!-- small brutish head sunk in shoulders -->
  <circle cx="34" cy="20" r="6.5" fill="#b9a78f" stroke="#1a222b" stroke-width="1.3"/>
  <path d="M30 15 L38 15 L37 18 L31 18 Z" fill="#33414f"/>
  <circle cx="38" cy="20" r="1.3" fill="#1a222b"/>
  <path d="M35 24 L40 23" stroke="#1a222b" stroke-width="1"/>
</svg>
