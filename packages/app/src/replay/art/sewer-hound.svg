<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Sewer-Hound: lean attack dog, low and forward, snarling right -->
  <!-- tail -->
  <path d="M12 34 Q4 30 8 24" fill="none" stroke="#33414f" stroke-width="3" stroke-linecap="round"/>
  <!-- back legs -->
  <rect x="16" y="42" width="4" height="13" rx="1.5" fill="#33414f"/>
  <rect x="21" y="43" width="4" height="12" rx="1.5" fill="#2a3540"/>
  <!-- front legs -->
  <rect x="40" y="42" width="4" height="13" rx="1.5" fill="#33414f"/>
  <rect x="45" y="43" width="4" height="12" rx="1.5" fill="#2a3540"/>
  <!-- lean body -->
  <path d="M14 36 C14 30 22 28 34 29 C44 30 48 34 50 40 C51 43 47 45 40 45 L20 45 C15 45 14 41 14 36 Z" fill="#46586e" stroke="#1a222b" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- rib hint -->
  <path d="M24 33 Q23 38 25 43 M30 33 Q29 38 31 43" fill="none" stroke="#33414f" stroke-width="1.2"/>
  <!-- head lunging forward -->
  <path d="M48 32 C52 30 60 32 61 38 L54 40 L48 39 Z" fill="#46586e" stroke="#1a222b" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- jaw / teeth -->
  <path d="M55 39 L61 38 L58 42 L54 42 Z" fill="#5f7288" stroke="#1a222b" stroke-width="1"/>
  <path d="M56 40 L57.5 42 L59 40 Z" fill="#e8e8e8"/>
  <!-- ear + eye -->
  <path d="M49 30 L52 24 L54 31 Z" fill="#33414f" stroke="#1a222b" stroke-width="1"/>
  <circle cx="53" cy="35" r="1.3" fill="#1a222b"/>
</svg>
