<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- MD Rattyfock: Warren-Warden patched up and returned as the warren's doctor —
       same rat, same pose (he IS the Season 1 Warden, canonically), now in a pale
       physician's coat with a head-mirror and a medic satchel where the scrap shield
       hung. "MD" finally means what it says. Palette stays muted/grimy: bone-white
       coat, tarnished brass mirror, dried-blood cross. -->
  <!-- tail -->
  <path d="M14 51 Q3 50 5 38 Q5 32 10 31" fill="none" stroke="#5e3120" stroke-width="2.8" stroke-linecap="round"/>
  <!-- body -->
  <path d="M14 51 C10 42 14 31 26 29 C35 28 42 32 45 39 L52 44 C53.3 45 52.4 46.4 51 46.4 L44 46.5 C41 51 33 54 24 54 C17 54 15.5 53.5 14 51 Z" fill="#8a4b2f" stroke="#201209" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- pale doctor's coat draped over the back, split hem -->
  <path d="M16 48 C13 41 17 32 27 30 C33 29.5 38 32 41 36 L40 44 C36 49 28 51.5 21 51 C18.5 50.7 17 49.8 16 48 Z" fill="#d9cfc9" stroke="#8f867d" stroke-width="1.2" stroke-linejoin="round"/>
  <path d="M28 31 L27 50 M34 33 L33 49" stroke="#b3a89f" stroke-width="1"/>
  <!-- dried-blood medic cross stitched on the coat's flank -->
  <rect x="21.5" y="38.5" width="9" height="3" rx="0.8" fill="#a34a3f"/>
  <rect x="24.5" y="35.5" width="3" height="9" rx="0.8" fill="#a34a3f"/>
  <!-- head -->
  <circle cx="40" cy="35" r="4.4" fill="#8a4b2f" stroke="#201209" stroke-width="1.5"/>
  <circle cx="40" cy="35" r="1.9" fill="#b4715a"/>
  <circle cx="47" cy="41" r="1.6" fill="#201209"/>
  <!-- head-mirror: brass band across the brow, tarnished disc above -->
  <path d="M36.2 33.2 Q40 30.6 43.8 33.2" fill="none" stroke="#8a6d3b" stroke-width="1.4"/>
  <circle cx="40" cy="29.5" r="2.6" fill="#c9b06a" stroke="#8a6d3b" stroke-width="1.2"/>
  <circle cx="40" cy="29.5" r="1.1" fill="#efe3bb"/>
  <!-- medic satchel slung low on the flank, clear of the snout, facing right -->
  <path d="M53 34 Q51 33 51 36 L51 48 Q51 51 54 51 L59 51 Q62 51 62 48 L62 37 Q62 34 59 34 Z" fill="#d9cfc9" stroke="#201209" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M53 38 L62 38" stroke="#8f867d" stroke-width="1.1"/>
  <rect x="54" y="42" width="5.6" height="2.4" rx="0.7" fill="#a34a3f"/>
  <rect x="55.6" y="40.4" width="2.4" height="5.6" rx="0.7" fill="#a34a3f"/>
  <!-- strap over the back -->
  <path d="M52 36 Q42 28 32 30" fill="none" stroke="#5e3120" stroke-width="1.6"/>
  <!-- legs -->
  <rect x="20" y="52" width="5" height="7" rx="2" fill="#5e3120"/>
  <rect x="33" y="52" width="5" height="7" rx="2" fill="#5e3120"/>
</svg>
