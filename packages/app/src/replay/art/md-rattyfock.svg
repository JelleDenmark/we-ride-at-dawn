<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- MD Rattyfock: Warren-Warden, patched and returned for the Season 1 tribute — same
       scrap-metal-shield frame (same character, same kit), with a stitched patch over the
       flank where whatever put it down the first time got sewn back shut. -->
  <path d="M14 51 Q3 50 5 38 Q5 32 10 31" fill="none" stroke="#5e3120" stroke-width="2.8" stroke-linecap="round"/>
  <path d="M14 51 C10 42 14 31 26 29 C35 28 42 32 45 39 L52 44 C53.3 45 52.4 46.4 51 46.4 L44 46.5 C41 51 33 54 24 54 C17 54 15.5 53.5 14 51 Z" fill="#8a4b2f" stroke="#201209" stroke-width="1.5" stroke-linejoin="round"/>
  <circle cx="40" cy="35" r="4.4" fill="#8a4b2f" stroke="#201209" stroke-width="1.5"/>
  <circle cx="40" cy="35" r="1.9" fill="#b4715a"/>
  <circle cx="47" cy="41" r="1.6" fill="#201209"/>
  <!-- big scrap-metal shield strapped to the flank, facing right -->
  <path d="M50 20 L58 26 L58 44 L50 50 L48 46 L48 24 Z" fill="#7a7d82" stroke="#201209" stroke-width="1.6" stroke-linejoin="round"/>
  <path d="M50 20 L58 26 L58 44 L50 50 Z" fill="#6a6d72"/>
  <!-- rivets and a dent -->
  <circle cx="53" cy="27" r="1.3" fill="#3f4045"/>
  <circle cx="53" cy="43" r="1.3" fill="#3f4045"/>
  <path d="M54 33 L56 37 L53 38" fill="none" stroke="#3f4045" stroke-width="1.2"/>
  <rect x="20" y="52" width="5" height="7" rx="2" fill="#5e3120"/>
  <rect x="33" y="52" width="5" height="7" rx="2" fill="#5e3120"/>
  <!-- the patch: stitched-together hide, the tell of having gone down once and come back -->
  <rect x="20" y="35" width="11" height="7" rx="1.5" fill="#c9a876" stroke="#5e3120" stroke-width="1"/>
  <path d="M22.5 36 L22.5 41 M25.5 35.5 L25.5 41.5 M28.5 36 L28.5 41" stroke="#5e3120" stroke-width="0.8"/>
</svg>
