<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Sluice-Bulwark: hulking riveted lock-gate armor, widest silhouette of the armored line -->
  <!-- braced legs -->
  <rect x="18" y="49" width="7" height="11" rx="1.5" fill="#33414f" stroke="#1a222b" stroke-width="1.3"/>
  <rect x="39" y="49" width="7" height="11" rx="1.5" fill="#2a3540" stroke="#1a222b" stroke-width="1.3"/>
  <!-- massive gate-plate torso, wider than the other armored foes -->
  <path d="M12 22 C12 17 52 17 52 22 L54 48 C54 51 10 51 10 48 Z" fill="#46586e" stroke="#1a222b" stroke-width="2" stroke-linejoin="round"/>
  <!-- overlapping horizontal lock-gate plates -->
  <rect x="12" y="25" width="40" height="4" fill="#33414f" stroke="#1a222b" stroke-width="0.8"/>
  <rect x="11" y="33" width="42" height="4" fill="#33414f" stroke="#1a222b" stroke-width="0.8"/>
  <rect x="10" y="41" width="44" height="4" fill="#33414f" stroke="#1a222b" stroke-width="0.8"/>
  <!-- rivets -->
  <circle cx="18" cy="27" r="1.1" fill="#8a97a6"/>
  <circle cx="32" cy="27" r="1.1" fill="#8a97a6"/>
  <circle cx="46" cy="27" r="1.1" fill="#8a97a6"/>
  <circle cx="17" cy="35" r="1.1" fill="#8a97a6"/>
  <circle cx="32" cy="35" r="1.1" fill="#8a97a6"/>
  <circle cx="47" cy="35" r="1.1" fill="#8a97a6"/>
  <circle cx="16" cy="43" r="1.1" fill="#8a97a6"/>
  <circle cx="32" cy="43" r="1.1" fill="#8a97a6"/>
  <circle cx="48" cy="43" r="1.1" fill="#8a97a6"/>
  <!-- central boss / sluice wheel -->
  <circle cx="32" cy="34" r="6" fill="#5f7288" stroke="#1a222b" stroke-width="1.6"/>
  <circle cx="32" cy="34" r="2.2" fill="#33414f"/>
  <path d="M32 28 L32 40 M26 34 L38 34" stroke="#1a222b" stroke-width="1.2"/>
  <!-- squat helm sunk low between broad shoulders -->
  <path d="M24 14 C24 7 40 7 40 14 L40 19 L24 19 Z" fill="#5f7288" stroke="#1a222b" stroke-width="1.8" stroke-linejoin="round"/>
  <rect x="24" y="15" width="16" height="2.6" fill="#1a222b"/>
  <circle cx="29" cy="16.3" r="0.9" fill="#7a9a4e"/>
  <circle cx="35" cy="16.3" r="0.9" fill="#7a9a4e"/>
</svg>
