  <!-- head + kettle helmet -->
  <circle cx="33" cy="16" r="8" fill="#b9a78f" stroke="#1a222b" stroke-width="1.3"/>
  <path d="M24 15 C24 8 42 8 42 15 Z" fill="#5f7288" stroke="#1a222b" stroke-width="1.5" stroke-linejoin="round"/>
