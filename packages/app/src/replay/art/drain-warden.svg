  <rect x="30" y="47" width="5" height="12" rx="1.5" fill="#2a3540"/>
  <!-- body behind shield -->
  <path d="M20 26 C20 22 38 22 38 26 L40 48 C40 50 18 50 18 48 Z" fill="#46586e" stroke="#1a222b" stroke-width="1.5" stroke-linejoin="round"/>
