<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Rat-Catcher: man with a long pole-and-net held forward -->
  <!-- long pole -->
  <rect x="20" y="20" width="40" height="3" rx="1.5" fill="#4e4234" transform="rotate(6 40 21)"/>
  <!-- net hoop at the far end -->
  <circle cx="56" cy="27" r="7" fill="none" stroke="#33414f" stroke-width="2"/>
  <path d="M50 24 L62 30 M50 30 L62 24 M56 20 L56 34 M49 27 L63 27" stroke="#5f7288" stroke-width="0.9"/>
  <!-- legs -->
  <rect x="20" y="47" width="5" height="12" rx="1.5" fill="#33414f"/>
  <rect x="29" y="47" width="5" height="12" rx="1.5" fill="#2a3540"/>
  <!-- body / apron -->
  <path d="M16 28 C16 24 38 24 38 28 L41 49 C41 51 15 51 15 49 Z" fill="#46586e" stroke="#1a222b" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- arms gripping pole (two hands) -->
  <rect x="22" y="26" width="7" height="5" rx="2.5" fill="#b9a78f" stroke="#1a222b" stroke-width="1"/>
  <rect x="34" y="22" width="7" height="5" rx="2.5" fill="#b9a78f" stroke="#1a222b" stroke-width="1"/>
  <!-- head + brimmed hat -->
  <circle cx="27" cy="16" r="7" fill="#b9a78f" stroke="#1a222b" stroke-width="1.3"/>
  <path d="M18 12 L37 12 L34 8 L21 8 Z" fill="#33414f" stroke="#1a222b" stroke-width="1.3" stroke-linejoin="round"/>
  <circle cx="32" cy="17" r="1.2" fill="#1a222b"/>
</svg>
