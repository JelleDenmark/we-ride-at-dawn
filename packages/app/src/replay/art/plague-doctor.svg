<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Plague-Doctor: beak-mask, long coat, sickly-green vial (poisons) -->
  <!-- legs -->
  <rect x="24" y="49" width="5" height="11" rx="1.5" fill="#2a3540"/>
  <rect x="32" y="49" width="5" height="11" rx="1.5" fill="#232c34"/>
  <!-- long dark coat -->
  <path d="M20 26 C20 22 40 22 40 26 L45 52 C45 55 15 55 15 52 Z" fill="#33414f" stroke="#1a222b" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M30 24 L30 53" stroke="#232c34" stroke-width="1.3"/>
  <!-- arm holding a green vial forward -->
  <rect x="38" y="34" width="8" height="4" rx="2" fill="#4a4a4a" stroke="#1a222b" stroke-width="1"/>
  <rect x="45" y="32" width="5" height="8" rx="1.5" fill="#7a9a4e" stroke="#1a222b" stroke-width="1.2"/>
  <rect x="46" y="30" width="3" height="3" fill="#5c7838"/>
  <!-- head base + wide-brim hat -->
  <circle cx="30" cy="16" r="7" fill="#46586e" stroke="#1a222b" stroke-width="1.3"/>
  <path d="M18 12 L40 12 L36 7 L24 7 Z" fill="#232c34" stroke="#1a222b" stroke-width="1.3" stroke-linejoin="round"/>
  <!-- long curved beak pointing right -->
  <path d="M34 14 Q48 16 44 24 Q40 20 32 19 Z" fill="#5f7288" stroke="#1a222b" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- round mask goggle -->
  <circle cx="32" cy="15" r="2.4" fill="#7a9a4e" stroke="#1a222b" stroke-width="1"/>
</svg>
