<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Culvert-Knight: full plate armor, visored helm, sword -->
  <!-- sword forward -->
  <rect x="40" y="31" width="22" height="3" rx="1" fill="#8a97a6" stroke="#1a222b" stroke-width="1"/>
  <rect x="38" y="28" width="3" height="9" rx="1" fill="#33414f"/>
  <!-- armored legs -->
  <rect x="22" y="47" width="6" height="13" rx="1.5" fill="#5f7288" stroke="#1a222b" stroke-width="1.2"/>
  <rect x="31" y="47" width="6" height="13" rx="1.5" fill="#33414f" stroke="#1a222b" stroke-width="1.2"/>
  <!-- plated torso -->
  <path d="M19 25 C19 21 41 21 41 25 L44 48 C44 50 16 50 16 48 Z" fill="#5f7288" stroke="#1a222b" stroke-width="1.6" stroke-linejoin="round"/>
  <!-- chest plate shading -->
  <path d="M30 22 L34 46 L26 46 Z" fill="#46586e"/>
  <path d="M22 32 L38 32" stroke="#33414f" stroke-width="1.3"/>
  <path d="M21 40 L39 40" stroke="#33414f" stroke-width="1.3"/>
  <!-- pauldron -->
  <circle cx="22" cy="27" r="5" fill="#46586e" stroke="#1a222b" stroke-width="1.3"/>
  <!-- gauntlet on sword -->
  <rect x="34" y="29" width="7" height="6" rx="2" fill="#5f7288" stroke="#1a222b" stroke-width="1"/>
  <!-- great helm -->
  <path d="M22 18 C22 9 40 9 40 18 L40 22 L22 22 Z" fill="#5f7288" stroke="#1a222b" stroke-width="1.6" stroke-linejoin="round"/>
  <rect x="22" y="17" width="18" height="2.6" fill="#1a222b"/>
  <path d="M30 9 Q32 3 36 4 Q33 8 32 12 Z" fill="#8a2f2f" stroke="#1a222b" stroke-width="1"/>
</svg>
