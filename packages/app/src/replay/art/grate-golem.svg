<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Grate-Golem: animated iron sewer-grate, blocky and armored -->
  <!-- blocky legs -->
  <rect x="20" y="48" width="8" height="12" fill="#33414f" stroke="#1a222b" stroke-width="1.3"/>
  <rect x="34" y="48" width="8" height="12" fill="#2a3540" stroke="#1a222b" stroke-width="1.3"/>
  <!-- big square grate torso -->
  <rect x="14" y="18" width="34" height="34" rx="2" fill="#46586e" stroke="#1a222b" stroke-width="2"/>
  <!-- grate bars (vertical) -->
  <rect x="19" y="22" width="3" height="26" fill="#33414f"/>
  <rect x="26" y="22" width="3" height="26" fill="#33414f"/>
  <rect x="33" y="22" width="3" height="26" fill="#33414f"/>
  <rect x="40" y="22" width="3" height="26" fill="#33414f"/>
  <!-- cross bars (horizontal) -->
  <rect x="15" y="29" width="32" height="3" fill="#2a3540"/>
  <rect x="15" y="39" width="32" height="3" fill="#2a3540"/>
  <!-- blocky arm reaching right -->
  <rect x="46" y="26" width="12" height="8" rx="1" fill="#5f7288" stroke="#1a222b" stroke-width="1.5"/>
  <rect x="55" y="24" width="6" height="12" rx="1" fill="#33414f" stroke="#1a222b" stroke-width="1.3"/>
  <!-- glowing slit eyes in upper bar -->
  <rect x="30" y="24" width="4" height="2.5" fill="#7a9a4e"/>
  <rect x="37" y="24" width="4" height="2.5" fill="#7a9a4e"/>
</svg>
