<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Watch-Sergeant: officer blowing a horn (summons whelps) -->
  <!-- legs -->
  <rect x="23" y="47" width="5" height="12" rx="1.5" fill="#33414f"/>
  <rect x="32" y="47" width="5" height="12" rx="1.5" fill="#2a3540"/>
  <!-- body with sash -->
  <path d="M20 27 C20 23 42 23 42 27 L44 48 C44 50 18 50 18 48 Z" fill="#46586e" stroke="#1a222b" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M22 27 L40 47" stroke="#8a2f2f" stroke-width="3" fill="none"/>
  <!-- head -->
  <circle cx="31" cy="16" r="7.5" fill="#b9a78f" stroke="#1a222b" stroke-width="1.3"/>
  <path d="M23 13 C23 8 39 8 39 13 Z" fill="#5f7288" stroke="#1a222b" stroke-width="1.5" stroke-linejoin="round"/>
  <!-- raised arm to mouth -->
  <rect x="32" y="20" width="6" height="5" rx="2" fill="#b9a78f" stroke="#1a222b" stroke-width="1"/>
  <!-- horn, flaring out to the right -->
  <path d="M37 18 L52 12 C58 10 60 20 54 20 L42 22 Z" fill="#c9a24a" stroke="#1a222b" stroke-width="1.4" stroke-linejoin="round"/>
  <path d="M52 12 C58 10 60 20 54 20" fill="#a9832f"/>
  <circle cx="36" cy="17" r="1.2" fill="#1a222b"/>
</svg>
