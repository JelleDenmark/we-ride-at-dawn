<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <!-- Muster-Captain: officer raising a banner (summons more) -->
  <!-- banner pole, raised high -->
  <rect x="44" y="6" width="3" height="46" rx="1.5" fill="#4e4234"/>
  <!-- banner flag -->
  <path d="M47 8 L61 11 L58 16 L61 21 L47 22 Z" fill="#5f7288" stroke="#1a222b" stroke-width="1.3" stroke-linejoin="round"/>
  <path d="M50 12 L56 15 L50 18 Z" fill="#33414f"/>
  <!-- legs -->
  <rect x="22" y="47" width="5" height="12" rx="1.5" fill="#33414f"/>
  <rect x="31" y="47" width="5" height="12" rx="1.5" fill="#2a3540"/>
  <!-- body / cloak -->
  <path d="M18 27 C18 22 40 22 40 27 L44 49 C44 51 16 51 16 49 Z" fill="#46586e" stroke="#1a222b" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M20 27 L38 47" stroke="#8a2f2f" stroke-width="3" fill="none"/>
  <!-- raised arm gripping pole -->
  <rect x="36" y="24" width="10" height="5" rx="2.5" fill="#b9a78f" stroke="#1a222b" stroke-width="1"/>
  <!-- head + plumed helm -->
  <circle cx="29" cy="16" r="7.5" fill="#b9a78f" stroke="#1a222b" stroke-width="1.3"/>
  <path d="M21 14 C21 8 37 8 37 14 Z" fill="#5f7288" stroke="#1a222b" stroke-width="1.5" stroke-linejoin="round"/>
  <path d="M28 8 Q30 3 34 4 Q31 7 30 11 Z" fill="#8a2f2f" stroke="#1a222b" stroke-width="1"/>
  <circle cx="34" cy="17" r="1.2" fill="#1a222b"/>
</svg>
