<!doctype html>
<html lang="en">
  <head>

    <title>We Ride at Dawn — press kit</title>
    <style>
      :root { color-scheme: dark; }
      body {
        margin: 0;
        background: #0d0b09;

      figure { margin: 0; }
      figcaption {
        color: #d4af37;

        height: auto;
        border: 1px solid #322820;

        display: block;
      }

      .dl a { color: #8a7f6c; font-size: 13px; text-decoration: none; }
