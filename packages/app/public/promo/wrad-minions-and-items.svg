<svg viewBox="0 0 820 1180" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <rect width="820" height="1180" fill="#0d0b09"/>
  <rect x="16" y="16" width="788" height="1148" fill="none" stroke="#4a3520" stroke-width="2"/>
  <rect x="22" y="22" width="776" height="1136" fill="none" stroke="#2a2118" stroke-width="1"/>

  <text x="410" y="80" text-anchor="middle" fill="#d8cdb8" font-size="40" letter-spacing="4">THE HORDE &amp; THE HOARD</text>
  <text x="410" y="112" text-anchor="middle" fill="#8a7f6c" font-size="15" font-style="italic">Just rats — a lot of rats. Value comes from numbers and multiplication, not heroes.</text>
  <line x1="150" y1="134" x2="670" y2="134" stroke="#4a3520" stroke-width="1"/>
  <text x="410" y="170" text-anchor="middle" fill="#d4af37" font-size="20" letter-spacing="3">A FEW OF THE RATS</text>

  <!-- CARD A: Dire-Rat -->
  <g>
    <rect x="55" y="192" width="345" height="178" fill="#1c150f" stroke="#4a3520" stroke-width="1.2" rx="4"/>
    <rect x="69" y="208" width="82" height="82" fill="#241a14" stroke="#4a3520" rx="6"/>
    <svg x="76" y="215" width="68" height="68" viewBox="0 0 64 64">
      <path d="M11 51 C6 40 11 26 27 24 C39 23 47 28 51 36 L60 42 C61.3 43 60.4 44.6 59 44.6 L50 44.5 C46 50 37 54 25 54 C16 54 13 53 11 51 Z" fill="#7a4128" stroke="#201209" stroke-width="1.7" stroke-linejoin="round"/>
      <path d="M20 30 C15 34 14 44 20 51 C14 44 14 34 20 30 Z" fill="#8a4b2f"/>
      <path d="M46 34 C44 27 51 23 57 25 L63 32 C64 33.3 63 35 61.5 34.8 L54 35 C50 36 47 35 46 34 Z" fill="#7a4128" stroke="#201209" stroke-width="1.7" stroke-linejoin="round"/>
      <circle cx="49" cy="25" r="4" fill="#7a4128" stroke="#201209" stroke-width="1.6"/>
      <circle cx="49" cy="25" r="1.7" fill="#9c5738"/>
      <circle cx="58" cy="32" r="1.7" fill="#201209"/>
      <path d="M34 34 L40 40 M43 33 L47 38" stroke="#4a2916" stroke-width="1.4" stroke-linecap="round"/>
      <rect x="18" y="52" width="5.5" height="8" rx="2.2" fill="#4a2916"/>
      <rect x="34" y="51" width="5.5" height="9" rx="2.2" fill="#4a2916"/>
    </svg>
    <text x="166" y="230" fill="#d8cdb8" font-size="20">Dire-Rat</text>
    <text x="166" y="256" fill="#f0e6d2" font-size="17" font-weight="bold">4/5</text>
    <text x="210" y="256" fill="#d4af37" font-size="13">· BRUISER</text>
    <text x="166" y="298" fill="#8a7f6c" font-size="14">A huge, scarred stat-stick —</text>
    <text x="166" y="318" fill="#8a7f6c" font-size="14">no trick, just fatten it and</text>
    <text x="166" y="338" fill="#8a7f6c" font-size="14">merge three into a monster.</text>
  </g>

  <!-- CARD B: Warren-Warden -->
  <g>
    <rect x="420" y="192" width="345" height="178" fill="#1c150f" stroke="#4a3520" stroke-width="1.2" rx="4"/>
    <rect x="434" y="208" width="82" height="82" fill="#241a14" stroke="#4a3520" rx="6"/>
    <svg x="441" y="215" width="68" height="68" viewBox="0 0 64 64">
      <path d="M14 51 C10 42 14 31 26 29 C35 28 42 32 45 39 L52 44 C53.3 45 52.4 46.4 51 46.4 L44 46.5 C41 51 33 54 24 54 C17 54 15.5 53.5 14 51 Z" fill="#8a4b2f" stroke="#201209" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="40" cy="35" r="4.4" fill="#8a4b2f" stroke="#201209" stroke-width="1.5"/>
      <circle cx="40" cy="35" r="1.9" fill="#b4715a"/>
      <circle cx="47" cy="41" r="1.6" fill="#201209"/>
      <path d="M50 20 L58 26 L58 44 L50 50 L48 46 L48 24 Z" fill="#7a7d82" stroke="#201209" stroke-width="1.6" stroke-linejoin="round"/>
      <path d="M50 20 L58 26 L58 44 L50 50 Z" fill="#6a6d72"/>
      <circle cx="53" cy="27" r="1.3" fill="#3f4045"/>
      <circle cx="53" cy="43" r="1.3" fill="#3f4045"/>
      <rect x="20" y="52" width="5" height="7" rx="2" fill="#5e3120"/>
      <rect x="33" y="52" width="5" height="7" rx="2" fill="#5e3120"/>
    </svg>
    <text x="531" y="230" fill="#d8cdb8" font-size="20">Warren-Warden</text>
    <text x="531" y="256" fill="#f0e6d2" font-size="17" font-weight="bold">2/6</text>
    <text x="575" y="256" fill="#d4af37" font-size="13">· ANCHOR</text>
    <text x="531" y="298" fill="#8a7f6c" font-size="14">At battle start, shields the</text>
    <text x="531" y="318" fill="#8a7f6c" font-size="14">whole line: +1/+1 to every</text>
    <text x="531" y="338" fill="#8a7f6c" font-size="14">rat mustered behind it.</text>
  </g>

  <!-- CARD C: Brood-Mother -->
  <g>
    <rect x="55" y="384" width="345" height="178" fill="#1c150f" stroke="#4a3520" stroke-width="1.2" rx="4"/>
    <rect x="69" y="400" width="82" height="82" fill="#241a14" stroke="#4a3520" rx="6"/>
    <svg x="76" y="407" width="68" height="68" viewBox="0 0 64 64">
      <path d="M17 52 C11 43 14 28 30 26 C40 25 48 30 51 37 L58 43 C59.3 44 58.4 45.5 57 45.5 L50 45.5 C46 51 38 55 28 55 C21 55 18 55 17 52 Z" fill="#8a4b2f" stroke="#201209" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M22 52 C20 44 26 40 32 42 C37 44 36 52 33 54 C28 56 24 56 22 52 Z" fill="#7a4128"/>
      <circle cx="29" cy="48" r="4.6" fill="#b4715a" stroke="#201209" stroke-width="1.3"/>
      <circle cx="27" cy="45" r="1.6" fill="#8a4b2f"/>
      <circle cx="30.5" cy="48" r="1.3" fill="#201209"/>
      <circle cx="45" cy="26" r="4.6" fill="#8a4b2f" stroke="#201209" stroke-width="1.5"/>
      <circle cx="45" cy="26" r="2" fill="#b4715a"/>
      <circle cx="52" cy="35" r="1.8" fill="#201209"/>
      <rect x="24" y="53" width="4.5" height="7" rx="1.8" fill="#5e3120"/>
      <rect x="42" y="51" width="4.5" height="8" rx="1.8" fill="#5e3120"/>
    </svg>
    <text x="166" y="422" fill="#d8cdb8" font-size="20">Brood-Mother</text>
    <text x="166" y="448" fill="#f0e6d2" font-size="17" font-weight="bold">2/3</text>
    <text x="210" y="448" fill="#d4af37" font-size="13">· BREED</text>
    <text x="166" y="490" fill="#8a7f6c" font-size="14">On death she births two</text>
    <text x="166" y="510" fill="#8a7f6c" font-size="14">Pups — the swarm feeds on</text>
    <text x="166" y="530" fill="#8a7f6c" font-size="14">its own losses.</text>
  </g>

  <!-- CARD D: Plague-Bearer -->
  <g>
    <rect x="420" y="384" width="345" height="178" fill="#1c150f" stroke="#4a3520" stroke-width="1.2" rx="4"/>
    <rect x="434" y="400" width="82" height="82" fill="#241a14" stroke="#4a3520" rx="6"/>
    <svg x="441" y="407" width="68" height="68" viewBox="0 0 64 64">
      <path d="M15 49 C11 40 15 30 27 28 C35 27 41 31 44 37 L54 43 C55.3 44 54.4 45.4 53 45.4 L45 45.5 C42 50 34 53 26 53 C19 53 16.5 52.5 15 49 Z" fill="#7c7a4e" stroke="#201209" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="24" cy="38" r="2.4" fill="#6fae3a"/>
      <circle cx="31" cy="43" r="2" fill="#6fae3a"/>
      <circle cx="20" cy="45" r="1.7" fill="#6fae3a"/>
      <circle cx="38" cy="40" r="4.6" fill="#7c7a4e" stroke="#201209" stroke-width="1.5"/>
      <circle cx="38" cy="40" r="2" fill="#8f9a5a"/>
      <circle cx="45" cy="43.5" r="1.7" fill="#201209"/>
      <path d="M50 20 L52 33" stroke="#4a4433" stroke-width="1.4" fill="none"/>
      <circle cx="52" cy="37" r="4.2" fill="#6a6350" stroke="#201209" stroke-width="1.3"/>
      <circle cx="52" cy="37" r="1.7" fill="#6fae3a"/>
      <path d="M49 18 Q46 14 49 11 Q52 9 50 5" fill="none" stroke="#6fae3a" stroke-width="1.8" stroke-linecap="round"/>
      <rect x="19" y="51" width="4.5" height="7" rx="1.8" fill="#3f4a2c"/>
      <rect x="35" y="49" width="4.5" height="8" rx="1.8" fill="#3f4a2c"/>
    </svg>
    <text x="531" y="422" fill="#d8cdb8" font-size="20">Plague-Bearer</text>
    <text x="531" y="448" fill="#f0e6d2" font-size="17" font-weight="bold">2/2</text>
    <text x="575" y="448" fill="#6fae3a" font-size="13">· PLAGUE</text>
    <text x="531" y="490" fill="#8a7f6c" font-size="14">At battle start, swings its</text>
    <text x="531" y="510" fill="#8a7f6c" font-size="14">censer — poison eats the</text>
    <text x="531" y="530" fill="#8a7f6c" font-size="14">frontmost foe alive.</text>
  </g>

  <!-- CARD E: Gnawer -->
  <g>
    <rect x="55" y="576" width="345" height="178" fill="#1c150f" stroke="#4a3520" stroke-width="1.2" rx="4"/>
    <rect x="69" y="592" width="82" height="82" fill="#241a14" stroke="#4a3520" rx="6"/>
    <svg x="76" y="599" width="68" height="68" viewBox="0 0 64 64">
      <path d="M16 49 C12 40 16 30 28 28 C36 27 42 31 45 37 C47 41 45 47 38 51 C31 54 22 54 18 51 Z" fill="#8a4b2f" stroke="#201209" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M40 30 C38 24 44 20 50 22 L57 30 C58 31.2 57 33 55.5 32.8 L47 33 C44 34 41 33 40 30 Z" fill="#8a4b2f" stroke="#201209" stroke-width="1.5" stroke-linejoin="round"/>
      <circle cx="43" cy="21" r="3.8" fill="#8a4b2f" stroke="#201209" stroke-width="1.5"/>
      <circle cx="43" cy="21" r="1.7" fill="#b4715a"/>
      <circle cx="52" cy="28" r="1.6" fill="#201209"/>
      <path d="M53 32 L54 44 L50 40 L49 32 Z" fill="#e8e2cf" stroke="#201209" stroke-width="1.1" stroke-linejoin="round"/>
      <path d="M49 32 L50 42 L46 39 L45.5 32 Z" fill="#e8e2cf" stroke="#201209" stroke-width="1.1" stroke-linejoin="round"/>
      <rect x="22" y="50" width="4.5" height="7" rx="1.8" fill="#5e3120"/>
      <rect x="34" y="50" width="4.5" height="7" rx="1.8" fill="#5e3120"/>
    </svg>
    <text x="166" y="614" fill="#d8cdb8" font-size="20">Gnawer</text>
    <text x="166" y="640" fill="#f0e6d2" font-size="17" font-weight="bold">3/1</text>
    <text x="210" y="640" fill="#d4af37" font-size="13">· SACRIFICE</text>
    <text x="166" y="682" fill="#8a7f6c" font-size="14">Glass cannon. On death it</text>
    <text x="166" y="702" fill="#8a7f6c" font-size="14">hands +2 attack to the rat</text>
    <text x="166" y="722" fill="#8a7f6c" font-size="14">behind — die to empower.</text>
  </g>

  <!-- CARD F: Bone-Priest -->
  <g>
    <rect x="420" y="576" width="345" height="178" fill="#1c150f" stroke="#4a3520" stroke-width="1.2" rx="4"/>
    <rect x="434" y="592" width="82" height="82" fill="#241a14" stroke="#4a3520" rx="6"/>
    <svg x="441" y="599" width="68" height="68" viewBox="0 0 64 64">
      <path d="M17 51 C13 42 17 32 28 30 C35 29 41 32 44 38 L51 43 C52.3 44 51.4 45.4 50 45.4 L44 45.5 C41 50 34 53 26 53 C19 53 18.5 53.5 17 51 Z" fill="#756552" stroke="#201209" stroke-width="1.5" stroke-linejoin="round"/>
      <path d="M40 38 C38 30 44 25 51 27 C57 29 58 37 53 41 C48 45 42 44 40 38 Z" fill="#e8e2cf" stroke="#201209" stroke-width="1.4" stroke-linejoin="round"/>
      <circle cx="50" cy="34" r="1.9" fill="#201209"/>
      <path d="M46 41 L47 44 M50 41 L51 44 M54 40 L55 43" stroke="#201209" stroke-width="1.1"/>
      <path d="M22 12 L28 46" stroke="#e8e2cf" stroke-width="3" stroke-linecap="round"/>
      <circle cx="21" cy="11" r="2.4" fill="#e8e2cf" stroke="#201209" stroke-width="1"/>
      <circle cx="24" cy="13" r="2.1" fill="#e8e2cf" stroke="#201209" stroke-width="1"/>
      <rect x="21" y="51" width="4.5" height="7" rx="1.8" fill="#4e4234"/>
      <rect x="34" y="51" width="4.5" height="7" rx="1.8" fill="#4e4234"/>
    </svg>
    <text x="531" y="614" fill="#d8cdb8" font-size="20">Bone-Priest</text>
    <text x="531" y="640" fill="#f0e6d2" font-size="17" font-weight="bold">1/4</text>
    <text x="575" y="640" fill="#e8e2cf" font-size="13">· REVIVE</text>
    <text x="531" y="682" fill="#8a7f6c" font-size="14">On death, raises your first</text>
    <text x="531" y="702" fill="#8a7f6c" font-size="14">fallen rat at 1 health — the</text>
    <text x="531" y="722" fill="#8a7f6c" font-size="14">warren never truly empties.</text>
  </g>

  <line x1="150" y1="792" x2="670" y2="792" stroke="#4a3520" stroke-width="1"/>
  <text x="410" y="828" text-anchor="middle" fill="#d4af37" font-size="20" letter-spacing="3">RELICS — PIN THEM TO A RAT</text>

  <!-- relic list, two columns -->
  <g fill="#d8cdb8" font-size="15">
    <text x="90" y="866"><tspan fill="#d4af37">✦ Rusted Nail</tspan><tspan fill="#8a7f6c"> — +2 attack</tspan></text>
    <text x="90" y="898"><tspan fill="#d4af37">✦ Glass Shard</tspan><tspan fill="#8a7f6c"> — +3 damage on the first hit</tspan></text>
    <text x="90" y="930"><tspan fill="#d4af37">✦ Weeping Boil</tspan><tspan fill="#8a7f6c"> — on death, 2 dmg to all foes</tspan></text>
    <text x="430" y="866"><tspan fill="#d4af37">✦ Fat Tick</tspan><tspan fill="#8a7f6c"> — +1/+2, heals each tick</tspan></text>
    <text x="430" y="898"><tspan fill="#d4af37">✦ Tail-Charm</tspan><tspan fill="#8a7f6c"> — survive one lethal hit</tspan></text>
    <text x="430" y="930"><tspan fill="#d4af37">✦ Filth Totem</tspan><tspan fill="#8a7f6c"> — the whole team +0/+1</tspan></text>
  </g>

  <text x="410" y="982" text-anchor="middle" fill="#8a7f6c" font-size="14" font-style="italic">Four archetypes to master: Breed &amp; swarm · Plague · Sacrifice · Bruiser &amp; anchor.</text>

  <!-- feedback CTA -->
  <rect x="70" y="1010" width="680" height="126" fill="#1d1713" stroke="#c4552e" stroke-width="1.5" rx="4"/>
  <text x="410" y="1046" text-anchor="middle" fill="#d4af37" font-size="19" letter-spacing="2">▸ WHICH RAT WOULD YOU BUILD AROUND?</text>
  <text x="410" y="1074" text-anchor="middle" fill="#d8cdb8" font-size="15">jelledenmark.github.io/we-ride-at-dawn</text>
  <text x="410" y="1100" text-anchor="middle" fill="#8a7f6c" font-size="14" font-style="italic">Feedback wanted: do the abilities read clearly? Which archetype tempts you most?</text>
  <text x="410" y="1122" text-anchor="middle" fill="#8a7f6c" font-size="14" font-style="italic">What rat or relic is missing from the warren?</text>
</svg>
